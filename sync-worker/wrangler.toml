# ProdLog sync worker — a ~100-line blob store on Cloudflare's free tier.
# One KV entry per sync key (hashed); the app pulls, merges locally, pushes.
name = "prodlog-sync"
main = "src/index.js"
compatibility_date = "2026-04-01"

[[kv_namespaces]]
binding = "STATE"
id = "699afe9c9ebe49b097a940737f0a6ea8"
