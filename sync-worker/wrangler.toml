# Pino sync worker — a ~100-line blob store on Cloudflare's free tier.
# One KV entry per sync key (hashed); the app pulls, merges locally, pushes.
# NOTE: deployed name below is still "prodlog-sync" (pre-rebrand) — renaming
# it means deploying under a new name/URL and updating DEFAULT_ENDPOINT in
# src/lib/sync.js; every device would need the new app build before syncing
# again. Left as-is pending that decision — see chat.
name = "prodlog-sync"
main = "src/index.js"
compatibility_date = "2026-04-01"

[[kv_namespaces]]
binding = "STATE"
id = "699afe9c9ebe49b097a940737f0a6ea8"
